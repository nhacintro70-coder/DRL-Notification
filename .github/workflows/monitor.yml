name: Theo dõi điểm rèn luyện

on:
  schedule:
    # Chạy mỗi 20 phút. Cú pháp cron là UTC.
    # Lưu ý: GitHub có thể delay vài phút vào giờ cao điểm, không đảm bảo chính xác tuyệt đối.
    - cron: "*/20 * * * *"
  workflow_dispatch: {}  # cho phép bấm "Run workflow" để chạy thử thủ công

# Tránh chạy song song 2 job cùng lúc nếu bị queue chồng
concurrency:
  group: monitor-check
  cancel-in-progress: false

permissions:
  contents: write  # cần quyền này để commit lại file trạng thái

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # tự kill nếu treo quá 15 phút, tránh chiếm slot
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cài thư viện + Playwright
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Chạy script kiểm tra
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FB_COOKIE: ${{ secrets.FB_COOKIE }}
        run: python monitor.py

      - name: Commit lại trạng thái (seen_posts.json, matched_posts.json)
        run: |
          git config user.name "diem-ren-luyen-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen_posts.json matched_posts.json
          git diff --cached --quiet || git commit -m "Cập nhật trạng thái theo dõi tự động"
          git push
