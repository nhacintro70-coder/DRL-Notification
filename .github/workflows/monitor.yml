name: Theo dõi điểm rèn luyện

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cài thư viện + Playwright
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Chạy script kiểm tra
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FB_COOKIE: ${{ secrets.FB_COOKIE }}
        run: python monitor.py

      - name: Commit lại trạng thái
        run: |
          git config user.name "diem-ren-luyen-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen_posts.json matched_posts.json
          git diff --cached --quiet || git commit -m "Cập nhật trạng thái theo dõi [skip ci]"
          git push
